<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!--
    Windows-specific app icon. Unlike the macOS variant this is NOT a soft
    squircle on a gradient: Windows icons read better flat, fuller, and squarer.
      - flat (non-gradient) background
      - full-bleed (no safe-area inset) → ~25% larger than the macOS 80% inset
      - smaller corner radius (rx 48 vs 112) → less rounded
      - no macOS bevel rim
  -->
  <defs>
    <linearGradient id="stripeGrad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#88CCFF"/>
      <stop offset="12%"  stop-color="#3388FF"/>
      <stop offset="35%"  stop-color="#4466EE"/>
      <stop offset="50%"  stop-color="#7744DD"/>
      <stop offset="65%"  stop-color="#AA44DD"/>
      <stop offset="88%"  stop-color="#CC66FF"/>
      <stop offset="100%" stop-color="#DDAAFF"/>
    </linearGradient>

    <clipPath id="clip">
      <rect width="512" height="512" rx="48"/>
    </clipPath>

    <filter id="neon" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="bigBloom"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="tightGlow"/>
      <feMerge>
        <feMergeNode in="bigBloom"/>
        <feMergeNode in="tightGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="4" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.5
                0 0 0 0 0.6
                0 0 0 0 1
                0 0 0 0.14 0" result="coloredNoise"/>
      <feComposite operator="in" in="coloredNoise" in2="SourceGraphic" result="clippedNoise"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="clippedNoise"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Flat, non-gradient background -->
    <rect width="512" height="512" fill="#22252B"/>

    <!-- Mark scaled up (0.88) to fill the fuller Windows tile -->
    <g transform="translate(256 256) scale(0.88) translate(-256 -256)">
      <g stroke="url(#stripeGrad)" stroke-width="48" stroke-linecap="round" fill="none" filter="url(#neon)">
        <line x1="144" y1="316" x2="220" y2="196"/>
        <line x1="218" y1="316" x2="294" y2="196"/>
        <line x1="292" y1="316" x2="368" y2="196"/>
      </g>
      <g stroke="url(#stripeGrad)" stroke-width="48" stroke-linecap="round" fill="none" filter="url(#grain)">
        <line x1="144" y1="316" x2="220" y2="196"/>
        <line x1="218" y1="316" x2="294" y2="196"/>
        <line x1="292" y1="316" x2="368" y2="196"/>
      </g>
    </g>
  </g>
</svg>
