<svg width="640" height="160" viewBox="0 0 640 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#4F8EF7"/>
      <stop offset="45%"  stop-color="#8BA8F9"/>
      <stop offset="100%" stop-color="#9B72D0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#E8EEFF"/>
      <stop offset="100%" stop-color="#C4CEFF"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#141828"/>
      <stop offset="100%" stop-color="#090B10"/>
    </radialGradient>
    <filter id="wGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.3 0 0 0 0.2  0 0 0 0 0.3  0 0 0 0 0.8  0 0 0 0.5 0" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect width="640" height="160" rx="24" fill="url(#bgGlow)"/>
  <rect width="640" height="160" rx="24" fill="none"
        stroke="#ffffff" stroke-width="1" stroke-opacity="0.07"/>

  <!-- ── Icon mark (scaled to ~100px, left-padded) ─────────────────── -->
  <g transform="translate(24, 8) scale(0.179)">
    <!-- Faint grid -->
    <g stroke="#4F8EF7" stroke-width="1" stroke-opacity="0.07">
      <line x1="60"  y1="176" x2="452" y2="176"/>
      <line x1="60"  y1="256" x2="452" y2="256"/>
      <line x1="60"  y1="336" x2="452" y2="336"/>
      <line x1="176" y1="60"  x2="176" y2="452"/>
      <line x1="256" y1="60"  x2="256" y2="452"/>
      <line x1="336" y1="60"  x2="336" y2="452"/>
    </g>
    <!-- W mark -->
    <path d="M 92,138 L 186,388 L 256,226 L 326,388 L 420,138"
      fill="none" stroke="url(#wGrad)" stroke-width="50"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#wGlow)"/>
    <!-- Spark -->
    <path d="M 256 66 C 253 75,247 81,234 84 C 247 87,253 93,256 102
             C 259 93,265 87,278 84 C 265 81,259 75,256 66 Z"
      fill="url(#wGrad)" opacity="0.9"/>
  </g>

  <!-- Thin separator -->
  <line x1="142" y1="36" x2="142" y2="124"
        stroke="#4F8EF7" stroke-width="1" stroke-opacity="0.25"/>

  <!-- ── Wordmark ───────────────────────────────────────────────────── -->
  <text
    x="164" y="107"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="6"
    fill="url(#textGrad)"
  >WARROOM</text>

  <!-- Subtle tagline -->
  <text
    x="166" y="132"
    font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="3.5"
    fill="#4F8EF7"
    opacity="0.7"
  >DEBATE INTELLIGENCE</text>
</svg>
